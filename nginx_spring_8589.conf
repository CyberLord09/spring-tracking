server {
    listen 8589 ssl;
    server_name spring.opencodingsociety.com;

    # SSL Configuration (Uncomment and adjust paths if using Let's Encrypt/Certbot)
    # ssl_certificate /etc/letsencrypt/live/spring.opencodingsociety.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/spring.opencodingsociety.com/privkey.pem;

    location / {
        # Forward requests to the internal Spring Boot WebSocket port
        proxy_pass http://localhost:8589;
        
        # Required headers for WebSocket Connection Upgrade
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Standard Proxy Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Prevent connection drops for idle WebSockets (24 hours)
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}
